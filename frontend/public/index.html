        <script>
            // Browser extensions (React DevTools, etc.) sometimes throw while
            // inspecting the page — that's not an app error, so keep it out
            // of the dev error overlay instead of showing a false alarm.
            window.addEventListener(
                "error",
                function (e) {
                    if (e.filename && e.filename.indexOf("chrome-extension://") === 0) {
                        e.stopImmediatePropagation();
                        e.preventDefault();
                    }
                },
                true
            );
        </script>
